<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Solar Demo - 用户侧</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <header class="topbar">
      <div>
        <p class="eyebrow">用户侧</p>
        <h1>电站经营结果看板</h1>
      </div>
      <nav class="nav-links">
        <a href="./index.html">返回入口</a>
        <a href="./ops.html">切换到运维侧</a>
      </nav>
    </header>

    <main class="page user-page">
      <section class="panel summary-hero">
        <div>
          <h2>OpenClaw 今日摘要</h2>
          <p id="assistantSummary" class="muted"></p>
        </div>
        <button id="refreshSummary" class="btn btn-primary">刷新摘要</button>
      </section>

      <section class="grid four-cols" id="kpiGrid"></section>

      <section class="panel two-col">
        <article>
          <h3>电站健康概览</h3>
          <div id="healthList" class="station-list"></div>
        </article>
        <article>
          <h3>OpenClaw 建议动作</h3>
          <ul id="actionList" class="clean-list"></ul>
        </article>
      </section>

      <section class="panel">
        <h3>自动生成运营周报（用户可读版）</h3>
        <p class="muted">周报只呈现结论、影响和建议，不暴露底层技术指标。</p>
        <button id="generateReport" class="btn btn-ghost">生成周报</button>
        <pre id="weeklyReport" class="report-box">点击按钮生成本周周报...</pre>
      </section>
    </main>

    <script src="./user.js"></script>
  </body>
</html>
